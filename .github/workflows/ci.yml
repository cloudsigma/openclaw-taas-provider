name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx -y clawhub@0.21.0 package validate . --json
      - run: npx -y clawhub@0.21.0 package pack . --pack-destination artifacts --json
